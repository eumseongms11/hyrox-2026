<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하이록스 관리자 페이지</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #e8390e;
    --black: #111;
    --white: #fff;
    --gray-bg: #f6f6f4;
    --gray-mid: #e0e0e0;
    --gray-text: #888;
    --radius: 12px;
    --radius-sm: 8px;
  }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--gray-bg);
    color: var(--black);
    min-height: 100vh;
  }

  /* ── Login ── */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .login-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--gray-mid);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .login-card h1 { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.4rem; }
  .login-card p { font-size: 0.85rem; color: var(--gray-text); margin-bottom: 1.75rem; }
  .login-card input {
    width: 100%; padding: 0.7rem 1rem;
    border: 1px solid var(--gray-mid);
    border-radius: var(--radius-sm);
    font-size: 0.95rem; font-family: inherit;
    outline: none; margin-bottom: 0.75rem;
    background: #fafafa;
  }
  .login-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,57,14,0.12); }
  .login-btn {
    width: 100%; padding: 0.8rem;
    background: var(--black); color: var(--white);
    border: none; border-radius: var(--radius-sm);
    font-size: 0.95rem; font-weight: 700;
    font-family: inherit; cursor: pointer;
  }
  .login-btn:hover { background: #333; }
  .login-error { font-size: 0.8rem; color: var(--accent); margin-top: 0.5rem; }

  /* ── Admin layout ── */
  .admin-wrap { display: none; }
  .admin-header {
    background: var(--black); color: var(--white);
    padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .admin-header h1 { font-size: 1rem; font-weight: 700; }
  .admin-header .meta { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
  .logout-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--white); font-family: inherit;
    font-size: 0.8rem; padding: 0.3rem 0.8rem;
    border-radius: 6px; cursor: pointer;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }

  /* ── Stats ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--white);
    border-radius: var(--radius-sm);
    border: 1px solid var(--gray-mid);
    padding: 1rem 1.25rem;
  }
  .stat-card .val { font-size: 1.8rem; font-weight: 800; line-height: 1; }
  .stat-card .val.accent { color: var(--accent); }
  .stat-card .lbl { font-size: 0.75rem; color: var(--gray-text); margin-top: 4px; }

  /* ── Controls ── */
  .controls {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 1.25rem;
    align-items: center;
  }
  .controls input {
    flex: 1; min-width: 180px;
    padding: 0.55rem 0.85rem;
    border: 1px solid var(--gray-mid);
    border-radius: var(--radius-sm);
    font-size: 0.9rem; font-family: inherit; outline: none;
  }
  .controls input:focus { border-color: var(--accent); }
  .btn {
    padding: 0.55rem 1rem;
    border-radius: var(--radius-sm);
    font-size: 0.85rem; font-weight: 600;
    font-family: inherit; cursor: pointer;
    border: 1px solid var(--gray-mid);
    background: var(--white);
    white-space: nowrap;
  }
  .btn:hover { background: var(--gray-bg); }
  .btn.primary { background: var(--black); color: var(--white); border-color: var(--black); }
  .btn.primary:hover { background: #333; }
  .btn.danger { color: #b91c1c; border-color: #fca5a5; }
  .btn.danger:hover { background: #fef2f2; }

  /* ── Table ── */
  .table-wrap {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--gray-mid);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  thead { background: #f9f9f7; }
  th {
    padding: 0.75rem 1rem; text-align: left;
    font-size: 0.72rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--gray-text);
    border-bottom: 1px solid var(--gray-mid);
  }
  td {
    padding: 0.85rem 1rem;
    border-bottom: 1px solid #f3f3f3;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .team-name-cell { font-weight: 700; font-size: 0.95rem; }
  .members-cell { font-size: 0.82rem; color: #444; line-height: 1.7; }
  .donation-cell { font-size: 0.82rem; color: var(--gray-text); }
  .date-cell { font-size: 0.75rem; color: var(--gray-text); white-space: nowrap; }
  .no-data {
    text-align: center; padding: 3rem 1rem;
    color: var(--gray-text); font-size: 0.9rem;
  }
  .loading { text-align: center; padding: 2rem; color: var(--gray-text); }

  .delete-btn {
    background: none; border: none; cursor: pointer;
    color: #ccc; font-size: 1rem; padding: 4px;
    border-radius: 4px;
  }
  .delete-btn:hover { color: #b91c1c; background: #fef2f2; }

  @media (max-width: 600px) {
    th:nth-child(4), td:nth-child(4),
    th:nth-child(5), td:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <h1>🏅 하이록스 관리자</h1>
    <p>관리자 비밀번호를 입력하세요</p>
    <input type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- Admin -->
<div class="admin-wrap" id="admin-wrap">
  <div class="admin-header">
    <div>
      <h1>교내 하이록스 관리자</h1>
      <div class="meta">마감: 2026.06.19(금)</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="val accent" id="stat-teams">-</div>
        <div class="lbl">신청 팀</div>
      </div>
      <div class="stat-card">
        <div class="val" id="stat-members">-</div>
        <div class="lbl">총 참가자</div>
      </div>
      <div class="stat-card">
        <div class="val" id="stat-donation">-</div>
        <div class="lbl">기부 팀</div>
      </div>
    </div>

    <div class="controls">
      <input type="text" id="search-input" placeholder="팀명 또는 이름으로 검색..." oninput="renderTable()">
      <button class="btn primary" onclick="loadData()">🔄 새로고침</button>
      <button class="btn" onclick="exportCSV()">📥 CSV 다운로드</button>
    </div>

    <div class="table-wrap">
      <div class="loading" id="loading">데이터를 불러오는 중...</div>
      <table id="data-table" style="display:none">
        <thead>
          <tr>
            <th>#</th>
            <th>팀명</th>
            <th>팀원</th>
            <th>기부물품</th>
            <th>신청일시</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div class="no-data" id="no-data" style="display:none">신청된 팀이 없습니다.</div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ifxbdzuxyjvuvvztctpq.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_Qaz0sO5UHxkxeoSEE9YbvA_m6PE8l-d';
  const ADMIN_PASSWORD = 'hyrox2026';

  let allTeams = [];

  function doLogin() {
    const pw = document.getElementById('pw-input').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('admin-wrap').style.display = 'block';
      loadData();
    } else {
      document.getElementById('login-error').textContent = '비밀번호가 틀렸습니다.';
    }
  }

  function doLogout() {
    document.getElementById('login-wrap').style.display = 'flex';
    document.getElementById('admin-wrap').style.display = 'none';
    document.getElementById('pw-input').value = '';
  }

  async function loadData() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('data-table').style.display = 'none';
    document.getElementById('no-data').style.display = 'none';

    if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
      allTeams = [
        { id: 1, team_name: '테스트팀', donation: '과자 1박스', extra_info: '없음', created_at: new Date().toISOString(),
          members: [
            { name: '홍길동', grade: 1, class: 2, number: 5, phone: '010-1234-5678', member_order: 1 },
            { name: '김철수', grade: 1, class: 2, number: 10, phone: '010-9999-8888', member_order: 2 }
          ]
        }
      ];
      updateStats();
      renderTable();
      return;
    }

    try {
      const teamsRes = await fetch(`${SUPABASE_URL}/rest/v1/teams?select=*&order=created_at.asc`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      const teams = await teamsRes.json();

      const membersRes = await fetch(`${SUPABASE_URL}/rest/v1/members?select=*&order=member_order.asc`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      const members = await membersRes.json();

      allTeams = teams.map(t => ({
        ...t,
        members: members.filter(m => m.team_id === t.id)
      }));

      updateStats();
      renderTable();
    } catch(e) {
      document.getElementById('loading').textContent = '데이터 로딩 실패. 새로고침 버튼을 눌러주세요.';
    }
  }

  function updateStats() {
    document.getElementById('stat-teams').textContent = allTeams.length;
    document.getElementById('stat-members').textContent = allTeams.reduce((s, t) => s + t.members.length, 0);
    document.getElementById('stat-donation').textContent = allTeams.filter(t => t.donation && t.donation.trim()).length;
  }

  function renderTable() {
    const query = document.getElementById('search-input').value.toLowerCase().trim();
    const filtered = query
      ? allTeams.filter(t =>
          t.team_name.toLowerCase().includes(query) ||
          t.members.some(m => m.name.toLowerCase().includes(query))
        )
      : allTeams;

    document.getElementById('loading').style.display = 'none';

    if (filtered.length === 0) {
      document.getElementById('data-table').style.display = 'none';
      document.getElementById('no-data').style.display = 'block';
      return;
    }

    document.getElementById('data-table').style.display = 'table';
    document.getElementById('no-data').style.display = 'none';

    const tbody = document.getElementById('table-body');
    tbody.innerHTML = filtered.map((team, idx) => {
      const memberLines = team.members
        .sort((a, b) => a.member_order - b.member_order)
        .map(m => `${m.grade}학년 ${m.class}반 ${m.number}번 <strong>${m.name}</strong> (${m.phone})`)
        .join('<br>');
      const date = new Date(team.created_at);
      const dateStr = `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
      return `<tr>
        <td style="color:var(--gray-text);font-size:0.8rem">${idx + 1}</td>
        <td class="team-name-cell">${team.team_name}</td>
        <td class="members-cell">${memberLines}</td>
        <td class="donation-cell">${team.donation || '-'}</td>
        <td class="date-cell">${dateStr}</td>
        <td><button class="delete-btn" onclick="deleteTeam(${team.id},'${team.team_name}')" title="삭제">✕</button></td>
      </tr>`;
    }).join('');
  }

  async function deleteTeam(teamId, teamName) {
    if (!confirm(`"${teamName}" 팀을 삭제하시겠습니까?`)) return;
    if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
      allTeams = allTeams.filter(t => t.id !== teamId);
      updateStats(); renderTable(); return;
    }
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/members?team_id=eq.${teamId}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      await fetch(`${SUPABASE_URL}/rest/v1/teams?id=eq.${teamId}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      allTeams = allTeams.filter(t => t.id !== teamId);
      updateStats(); renderTable();
    } catch(e) { alert('삭제 실패. 다시 시도해주세요.'); }
  }

  function exportCSV() {
    if (allTeams.length === 0) { alert('데이터가 없습니다.'); return; }
    const rows = [['번호','팀명','팀원순서','이름','학년','반','번호','연락처','기부물품','기타','신청일시']];
    allTeams.forEach((t, idx) => {
      t.members.forEach(m => {
        rows.push([
          idx+1, t.team_name, m.member_order, m.name,
          m.grade, m.class, m.number, m.phone,
          t.donation || '', t.extra_info || '',
          new Date(t.created_at).toLocaleString('ko-KR')
        ]);
      });
    });
    const bom = '\uFEFF';
    const csv = bom + rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = '하이록스_참가명단_' + new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','')+'.csv';
    a.click(); URL.revokeObjectURL(url);
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
